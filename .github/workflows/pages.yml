# Auto-deploy to GitHub Pages on push to main.
#
# Drops the WHOLE Trail-Planner-V4 directory onto GH Pages. So once it's
# pushed, the planner is reachable at https://<user>.github.io/<repo>/
# and share.html (along with any exported standalone HTML files in the
# repo root) is reachable via the same origin.
#
# Setup (one-time):
#   1. Push this folder to a new GitHub repo.
#   2. Repo Settings → Pages → Source: "GitHub Actions".
#   3. First push to `main` triggers this workflow and publishes the site.
#   4. Subsequent pushes auto-redeploy.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publishes the whole repo as-is. No build step (vanilla JS, no
          # bundler). If we ever need a build, swap to actions/setup-node
          # and a `npm run build`-style flow.
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
